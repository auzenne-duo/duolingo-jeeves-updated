repos:
  - repo: https://github.com/duolingo/pre-commit-hooks.git
    rev: 1.1.0
    hooks:
      - id: duolingo
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        files: \.py$
  - repo: local
    hooks:
      - id: sync-requirements
        name: Sync Python Requirements
        entry: sh -c "pip-compile requirements.in && pip-compile dev-requirements.in"
        language: system
        files: requirements\.(in|txt)$
        pass_filenames: false
