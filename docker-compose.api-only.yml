networks:
  memcached-net:

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: duolingojeeves_api
    networks:
      - memcached-net
    ports:
      - "8080:8080"
    tty: true
    volumes:
      - ./config/aws_credentials_local:/root/.aws/credentials
    environment:
      - AWS_ACCESS_KEY_ID
      - AWS_DEFAULT_REGION
      - AWS_DEFAULT_PROFILE
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - DUOLINGO_CONFIG
      - DUOLINGO_JWT
      - JIRA_API_TOKEN
      - JIRA_USERNAME
      - SHAKIRA_JIRA_API_TOKEN_WEB=${JIRA_API_TOKEN}
      - SHAKIRA_JIRA_USERNAME_WEB=${JIRA_USERNAME}

  memcached:
    container_name: memcached
    image: memcached:1.6.21
    networks:
      - memcached-net
    ports:
      - "11211:11211"
