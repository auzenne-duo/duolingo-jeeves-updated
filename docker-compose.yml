version: "2"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - aws_access_key=${AWS_ACCESS_KEY_ID}
        - aws_secret_key=${AWS_SECRET_ACCESS_KEY}
    tty: true
    image: duolingojeeves_api
    ports:
      - "5000:5000"
    volumes:
      - .:/code
      - ~/.aws:/root/.aws
    environment:
      - JIRA_USERNAME
      - JIRA_API_TOKEN
      - SHAKIRA_JIRA_USERNAME_WEB
      - SHAKIRA_JIRA_API_TOKEN_WEB

  s3-worker:
    image: duolingojeeves_api
    volumes:
      - .:/code
      - ~/.aws:/root/.aws
    command: ["python", "./jeeves/scripts/update_jeeves_data.py"]
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - aws_access_key=${AWS_ACCESS_KEY_ID}
        - aws_secret_key=${AWS_SECRET_ACCESS_KEY}
    environment:
      - JIRA_USERNAME
      - JIRA_API_TOKEN

  sqs-worker-1:
    image: duolingojeeves_api
    volumes:
      - .:/code
      - ~/.aws:/root/.aws
    command: ["python", "/code/jeeves/scripts/sqs_verify_worker.py"]
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - aws_access_key=${AWS_ACCESS_KEY_ID}
        - aws_secret_key=${AWS_SECRET_ACCESS_KEY}

  sqs-worker-2:
    image: duolingojeeves_api
    volumes:
      - .:/code
      - ~/.aws:/root/.aws
    command: ["python", "/code/jeeves/scripts/sqs_index_worker.py"]
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - aws_access_key=${AWS_ACCESS_KEY_ID}
        - aws_secret_key=${AWS_SECRET_ACCESS_KEY}

  spike-worker:
    image: duolingojeeves_api
    volumes:
      - .:/code
      - ~/.aws:/root/.aws
    command: ["python", "/code/jeeves/scripts/spike_worker.py", "True"]
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - aws_access_key=${AWS_ACCESS_KEY_ID}
        - aws_secret_key=${AWS_SECRET_ACCESS_KEY}
