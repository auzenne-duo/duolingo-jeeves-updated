version: "2"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    tty: true
    image: duolingojeeves_api
    ports:
      - "5000:5000"
    volumes:
      - .:/code
      - ~/.aws:/root/.aws

  cronworker:
    image: duolingojeeves_api
    volumes:
      - .:/code
      - ~/.aws:/root/.aws
    command: ["python", "/code/jeeves/scripts/slack.py"]
    build:
      context: .
      dockerfile: Dockerfile.dev
