fields:
- datatype: str
  field: appVersion
  unique: False
- datatype: str
  field: flavor
  unique: False
- datatype: str
  field: apiLevel
  unique: False
- datatype: str
  field: osVersion
  unique: False
- datatype: str
  field: hostDevice
  unique: False
- datatype: str
  field: modelProduct
  unique: False
- datatype: str
  field: micTest
  unique: False
- datatype: str
  field: screen
  unique: False
- datatype: str
  field: screenDensity
  unique: False
- datatype: str
  field: installLocation
  unique: False
- datatype: str
  field: memLimits
  unique: False
- datatype: str
  field: username
  unique: True
- datatype: str
  field: toLanguage
  unique: False
- datatype: str
  field: fromLanguage
  unique: False
- datatype: str
  field: locale
  unique: False
- datatype: str
  field: deviceLanguage
  unique: False
- datatype: str
  field: deviceDefaultLocale
  unique: False
- datatype: str
  field: platform
  unique: False
metadata:
  android:
    implicitFields:
    - field: platform
      value: android
    parseFields:
    - optional: false
      pattern: (?P<appVersion>.*?) (?P<flavor>.*?)
      title: App version code
    - optional: false
      pattern: (?P<apiLevel>.*?)
      title: API Level
    - optional: false
      pattern: (?P<osVersion>.*?)
      title: OS Version
    - optional: false
      pattern: (?P<hostDevice>.*?)
      title: Host (Device)
    - optional: false
      pattern: (?P<modelProduct>.*?)
      title: Model (Product)
    - optional: true
      pattern: (?P<micTest>.*?)
      title: Microphone Test
    - optional: false
      pattern: (?P<screen>.*?), (?P<screenDensity>.*?)dpi
      title: Screen
    - optional: false
      pattern: (?:(?P<installLocation>.*?), )?(?P<memLimits>.*?)
      title: Config
    - optional: true
      pattern: (?P<username>.*?)
      title: Username
    - optional: false
      pattern: '(?:(?P<toLanguage>.*?)<-(?P<fromLanguage>.*?))?(?: \((?P<locale>.*?)\))? : (?P<deviceLanguage>.*?) : (?P<deviceDefaultLocale>.*?)'
      title: Languages
    parseFormat: '{title}: {pattern}[ \t\r]*\n'
  ios:
    implicitFields:
    - field: platform
      value: ios
    parseFields:
    - optional: false
      pattern: (?P<username>.*?)
      title: Username
    - optional: false
      pattern: (?P<appVersion>.*?)
      title: App version
    - optional: false
      pattern: (?P<modelProduct>.*?)
      title: Device model
    - optional: false
      pattern: (?P<osVersion>.*?)
      title: OS version
    - optional: false
      pattern: (?P<fromLanguage>.*?)
      title: UI language
    - optional: false
      pattern: (?P<toLanguage>.*?)
      title: Learning language
    parseFormat: '{title}: {pattern}[ \t\r]*\n'
