{% extends "layout.html" %}

{% block title %}Analysis | Duolingo Jeeves{% endblock %}

{% block head %}
  {{ super() }}
  <style>
  #chart_container {
    height: 500px;
  }
  #query {
    padding: .55em 1em .55em 3em;
    font-size: 22px;
    border: 2px solid #eeeeee;
    line-height: 1.2em;
    font-weight: normal;
    border-radius: 40px;
    width: 100%;
    -webkit-appearance: none;
    color: #999;
  }
  input[type=search] {
    -webkit-box-sizing: border-box;
    -moz-box-sizing: border-box;
    box-sizing: border-box;
  }
  input, textarea {
    color: #666666;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }
  .search-box:before {
    content: "\1F50D";
    font-family: 'entypo';
    font-size: 1.25em;
    line-height: 0;
    position: absolute;
    text-align: center;
    top: 50%;
    z-index: 1;
    color: #cccccc;
    margin-left: 25px;
  }
  .search-box input[type="submit"] {
    display: none;
  }
  .search-box {
    position: relative;
  }
  *, *:before, *:after {
    outline: none;
  }
  @font-face {
    font-family: "entypo";
    src: url(https://p4.zdassets.com/hc/assets/entypo-3abe7740fe6a52bc50b230991f869092.eot);
    src: url(https://p4.zdassets.com/hc/assets/entypo-3abe7740fe6a52bc50b230991f869092.eot?#iefix) format("embedded-opentype"), url(https://p4.zdassets.com/hc/assets/entypo-5adc1c49be0325a8cdac239d1b0b05ad.woff) format("woff"), url(https://p4.zdassets.com/hc/assets/entypo-d19e604cb2db8e8a56bd13031d6e2b32.ttf) format("truetype"), url(https://p4.zdassets.com/hc/assets/entypo-871383d0cf0ec0b749040df783006519.svg#entypo) format("svg");
    font-weight: normal;
    font-style: normal;
  }
  @media screen and (-webkit-min-device-pixel-ratio: 0) {
    @font-face {
      font-family: "entypo";
      src: url(https://p4.zdassets.com/hc/assets/entypo-871383d0cf0ec0b749040df783006519.svg#entypo) format("svg");
    }
  }
  </style>
  <script>
    WORD = '{{word}}';
    DEBUG = {{'true' if debug else 'false'}};
  </script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <script type="text/javascript" src="{{url_for('static', filename='js/chart.js')}}"></script>
{% endblock %}

{% block body %}
<section>
<h1>Analysis</h1>
</section>

<section class="search-box">
  <form class="search" method="get" action="javascript:drawChart()">
    <input type="search" name="query" id="query" placeholder="Type keyword here"
     class="ui-autocomplete-input" autocomplete="off" value="{{word}}">
    <input type="submit" name="commit" value="Search">
  </form>
</section>

<div id="chart_container"></div>

{% endblock %}
