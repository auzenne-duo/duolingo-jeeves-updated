{% extends "layout.html" %}

{% block title %}Analysis | Duolingo Jeeves{% endblock %}

{% block head %}
  {{ super() }}
  <style>
  #chart_container {
    height: 500px;
  }
  #query {
    padding: .55em 1em .55em 3em;
    font-size: 22px;
    border: 2px solid #eeeeee;
    line-height: 1.2em;
    font-weight: normal;
    border-radius: 40px;
    width: 100%;
    -webkit-appearance: none;
    color: #999;
  }
  input[type=search] {
    -webkit-box-sizing: border-box;
    -moz-box-sizing: border-box;
    box-sizing: border-box;
  }
  input, textarea {
    color: #666666;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }
  .search-box:before {
    content: "\1F50D";
    font-family: 'entypo';
    font-size: 1.25em;
    line-height: 0;
    position: absolute;
    text-align: center;
    top: 50%;
    z-index: 1;
    color: #cccccc;
    margin-left: 25px;
  }
  .search-box input[type="submit"] {
    display: none;
  }
  .search-box {
    position: relative;
  }
  *, *:before, *:after {
    outline: none;
  }
  @font-face {
    font-family: "entypo";
    src: url(https://p4.zdassets.com/hc/assets/entypo-3abe7740fe6a52bc50b230991f869092.eot);
    src: url(https://p4.zdassets.com/hc/assets/entypo-3abe7740fe6a52bc50b230991f869092.eot?#iefix) format("embedded-opentype"), url(https://p4.zdassets.com/hc/assets/entypo-5adc1c49be0325a8cdac239d1b0b05ad.woff) format("woff"), url(https://p4.zdassets.com/hc/assets/entypo-d19e604cb2db8e8a56bd13031d6e2b32.ttf) format("truetype"), url(https://p4.zdassets.com/hc/assets/entypo-871383d0cf0ec0b749040df783006519.svg#entypo) format("svg");
    font-weight: normal;
    font-style: normal;
  }
  @media screen and (-webkit-min-device-pixel-ratio: 0) {
    @font-face {
      font-family: "entypo";
      src: url(https://p4.zdassets.com/hc/assets/entypo-871383d0cf0ec0b749040df783006519.svg#entypo) format("svg");
    }
  }
  .browse_wrapper {
    text-align: center;
  }
  </style>
  <script src="{{url_for('static', filename='js/common.js')}}"></script>
  <script src="{{url_for('static', filename='js/ticket.js')}}"></script>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="{{url_for('static', filename='js/chart.js')}}"></script>
  <script>
    $(document).ready(function() {
      var page = parseInt(getParameterByName('page', '0'));
      var word = getParameterByName('word', 'freeze');
      $('#query').val(word);
      $('.word_str').html(word);

      google.charts.load('current', {packages: ['corechart', 'line']});
      google.charts.setOnLoadCallback(drawChart);

      loadTickets(page, word);
      $('.next').click(function() {
        loadTickets($(this).data('next_page'), word);
      });
    });
    function update() {
      var word = $('#query').val();
      $('.word_str').html(word);
      drawChart();
      loadTickets(0, word);
    }
  </script>
{% endblock %}

{% block body %}
<main>
<section>
<h1>Time Series Analyzer</h1>
</section>

<section class="search-box">
  <form class="search" method="get" action="javascript:update()">
    <input type="search" name="query" id="query" placeholder="Type keyword here"
     class="ui-autocomplete-input" autocomplete="off">
    <input type="submit" name="commit" value="Search">
  </form>
</section>

<section class="small-section">
  <h2>Trend</h2>
</section>
<div id="chart_container"></div>

<section class="small-section">
  <h2>Tickets containing "<span class="word_str"></span>"</h2>
</section>
<section id="tickets"></section>

<section class="next_wrapper">
  <button class="next btn-primary">Next</button>
</section>

</main>
{% endblock %}
