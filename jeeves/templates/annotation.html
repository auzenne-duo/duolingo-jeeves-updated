{% extends "layout.html" %}

{% block title %}Annotation Tool | Duolingo Jeeves{% endblock %}

{% block head %}
  {{ super() }}
  <script src="/static/js/ticket.js?_={{random}}"></script>
  <style>
  .next_wrapper {
    text-align: center;
  }
  </style>
  <script>
  $(document).ready(function() {
    loadTickets(0);
    $('.next').click(function() {
      var json_data = [];
      $('.ticket_table').each(function() {
        var table = $(this);
        var category_labels = [];
        table.find('input:checked').each(function() {
          category_labels.push($(this).val());
        });
        json_data.push({ticket_id: table.data('id'), category_labels: category_labels});
      });
      $.ajax({
        type: 'PATCH',
        url: '/api/1/tickets',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json'
        },
        data: JSON.stringify(json_data)
      });
      loadTickets($(this).data('next_page'));
    });
  });
  </script>
{% endblock %}

{% block body %}
<main>
<section>
  <h1>Annotation Tool</h1>
</section>

<section id="tickets"></section>

<section class="next_wrapper">
  <button class="next btn-primary">Save &amp; Continue</button>
</section>
</main>
{% endblock %}
