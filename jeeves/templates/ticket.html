<html>
<head>
<link rel="stylesheet" href="{{url_for('static', filename='css/common.css')}}" type="text/css">
</head>
<body>
<h1>List of tickets</h1>

<section>
{% for ticket in tickets %}
<table>
<tr>
<td>ID</td>
<td><a href="#">{{ticket.ticket_id}}</a></td>
</tr>
<tr>
<td>Date</td>
<td>{{ticket.date_time}}</td>
</tr>
<tr>
<td>Subject</td>
<td>{{ticket.subject}}</td>
</tr>
<tr>
<td>Description</td>
<td>
{{ticket.description}}
</td>
</tr>
</table>
<br>
{% endfor %}
</section>

</body>
</html>
